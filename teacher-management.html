<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teacher Management - CCR</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="public/css/style.css" rel="stylesheet">
    <script src="public/js/auth-check.js" defer></script>
</head>
<body>
    <nav class="navbar navbar-expand-lg sticky-top">
        <div class="container">
            <a class="navbar-brand" href="#"><i class="fas fa-graduation-cap"></i> CCR</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <div class="navbar-nav ms-auto">
                    <a class="nav-link" href="index.html"><i class="fas fa-home"></i> Dashboard</a>
                    <a class="nav-link" href="subject-management.html"><i class="fas fa-book"></i> Subjects</a>
                    <a class="nav-link" href="class-management.html"><i class="fas fa-users"></i> Classes</a>
                    <a class="nav-link" href="chapter-management.html"><i class="fas fa-file-alt"></i> Chapters</a>
                    <a class="nav-link" href="current-status.html"><i class="fas fa-tasks"></i> Status</a>
                    <a class="nav-link active" href="teacher-management.html"><i class="fas fa-chalkboard-teacher"></i> Teachers</a>
                    <a class="nav-link" href="teacher-allotment.html"><i class="fas fa-tasks"></i> Allotment</a>
                    <a class="nav-link" href="register.html"><i class="fas fa-user-plus"></i> Register</a>
                    <button id="dark-mode-toggle" class="btn btn-outline-secondary ms-2">
                        <i class="fas fa-moon"></i>
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <div class="container">
        <h1 class="text-center">Teachers Management</h1>

        <!-- Add Teacher Card -->
        <div class="card">
            <div class="card-header">
                <h5><i class="fas fa-plus-circle"></i> Add New Teacher</h5>
            </div>
            <div class="card-body">
                <div class="row g-3 align-items-end">
                    <div class="col-md-8">
                        <label for="teacher-name" class="form-label">Teacher Name</label>
                        <input type="text" class="form-control" id="teacher-name" placeholder="Enter teacher name">
                    </div>
                    <div class="col-md-4">
                        <button class="btn btn-success w-100" id="add-btn"><i class="fas fa-plus"></i> Add Teacher</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Teachers List Card -->
        <div class="card">
            <div class="card-header">
                <h5><i class="fas fa-list-ul"></i> Teachers List</h5>
            </div>
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-hover" id="teacher-table">
                        <thead>
                            <tr>
                                <th>Name</th>
                                <th style="width: 200px;">Actions</th>
                            </tr>
                        </thead>
                        <tbody id="teacher-tbody"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script src="public/js/teacher-management.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="public/js/dark-mode.js"></script>
</body>
</html>
