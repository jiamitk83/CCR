<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Current Status - CCR</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="public/css/style.css" rel="stylesheet">
    <script src="public/js/auth-check.js" defer></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>
</head>
<body>
    <nav class="navbar navbar-expand-lg sticky-top">
        <div class="container">
            <a class="navbar-brand" href="#"><i class="fas fa-graduation-cap"></i> CCR</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <div class="navbar-nav ms-auto">
                    <a class="nav-link" href="index.html"><i class="fas fa-home"></i> Dashboard</a>
                    <a class="nav-link" href="subject-management.html"><i class="fas fa-book"></i> Subjects</a>
                    <a class="nav-link" href="class-management.html"><i class="fas fa-users"></i> Classes</a>
                    <a class="nav-link" href="chapter-management.html"><i class="fas fa-file-alt"></i> Chapters</a>
                    <a class="nav-link active" href="current-status.html"><i class="fas fa-tasks"></i> Status</a>
                    <a class="nav-link" href="teacher-management.html"><i class="fas fa-chalkboard-teacher"></i> Teachers</a>
                    <a class="nav-link" href="register.html"><i class="fas fa-user-plus"></i> Register</a>
                    <button id="dark-mode-toggle" class="btn btn-outline-secondary ms-2">
                        <i class="fas fa-moon"></i>
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <div class="container">
        <h1 class="text-center">Current Status</h1>

        <!-- Filter Card -->
        <div class="card">
            <div class="card-header">
                <h5><i class="fas fa-filter"></i> Select Class & Subject</h5>
            </div>
            <div class="card-body">
                <div class="row g-4">
                    <div class="col-md-6">
                        <label for="class-select" class="form-label">Class</label>
                        <select class="form-select" id="class-select" aria-label="Select Class">
                            <option value="">Select Class</option>
                        </select>
                    </div>
                    <div class="col-md-6">
                        <label for="subject-select" class="form-label">Subject</label>
                        <select class="form-select" id="subject-select" disabled aria-label="Select Subject">
                            <option value="">Select Subject</option>
                        </select>
                    </div>
                </div>
            </div>
        </div>

        <!-- Status Table Card -->
        <div class="card">
            <div class="card-header d-flex justify-content-between align-items-center">
                <h5 class="mb-0"><i class="fas fa-table"></i> Status Report</h5>
                <div>
                    <button class="btn btn-primary me-2" id="submit-btn"><i class="fas fa-save"></i> Submit</button>
                    <button class="btn btn-success" id="generate-pdf-btn"><i class="fas fa-file-pdf"></i> Generate PDF</button>
                </div>
            </div>
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-hover" id="status-table" style="display: none;">
                        <thead>
                            <tr>
                                <th>Chapter No.</th>
                                <th>Chapter Name</th>
                                <th class="text-center">
                                    Chapter Completion
                                    <button class="btn btn-sm btn-outline-secondary ms-2" id="mark-all-btn" title="Mark All Completed">
                                        <i class="fas fa-check-double"></i>
                                    </button>
                                </th>
                                <th class="text-center">Notebook Completion</th>
                                <th class="text-center">Worksheet Completed</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="status-tbody"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script src="public/js/current-status.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="public/js/dark-mode.js"></script>
</body>
</html>
