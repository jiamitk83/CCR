    <link href="public/css/style.css" rel="stylesheet">
    <script src="public/js/auth-check.js" defer></script>
</head>
<body>
    <nav class="navbar navbar-expand-lg sticky-top">
        <div class="container">
            <a class="navbar-brand" href="index.html"><i class="fas fa-graduation-cap"></i> School ERP</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <div class="navbar-nav ms-auto">
                    <a class="nav-link" href="index.html"><i class="fas fa-home"></i> Dashboard</a>
                    <a class="nav-link" href="student-management.html"><i class="fas fa-user-graduate"></i> Students</a>
                    <a class="nav-link" href="subject-management.html"><i class="fas fa-book"></i> Subjects</a>
                    <a class="nav-link" href="class-management.html"><i class="fas fa-users"></i> Classes</a>
                    <a class="nav-link" href="chapter-management.html"><i class="fas fa-file-alt"></i> Chapters</a>
                    <a class="nav-link" href="current-status.html"><i class="fas fa-tasks"></i> Status</a>
                    <a class="nav-link" href="teacher-management.html"><i class="fas fa-chalkboard-teacher"></i> Teachers</a>
                    <a class="nav-link" href="teacher-allotment.html"><i class="fas fa-tasks"></i> Allotment</a>
                    <a class="nav-link" href="attendance.html"><i class="fas fa-calendar-check"></i> Attendance</a>
                    <a class="nav-link" href="fee-management.html"><i class="fas fa-rupee-sign"></i> Fees</a>
                    <a class="nav-link" href="exam-results.html"><i class="fas fa-clipboard-list"></i> Exams</a>
                    <a class="nav-link" href="timetable.html"><i class="fas fa-calendar-alt"></i> Timetable</a>
                    <a class="nav-link" href="library.html"><i class="fas fa-book-reader"></i> Library</a>
                    <a class="nav-link" href="transport.html"><i class="fas fa-bus"></i> Transport</a>
                    <a class="nav-link active" href="notice-board.html"><i class="fas fa-bullhorn"></i> Notices</a>
                    <a class="nav-link" href="homework.html"><i class="fas fa-pencil-alt"></i> Homework</a>
                    <button id="dark-mode-toggle" class="btn btn-outline-secondary ms-2"><i class="fas fa-moon"></i></button>
                </div>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h1><i class="fas fa-bullhorn"></i> Notice Board</h1>
            <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#noticeModal">
                <i class="fas fa-plus"></i> Post Notice
            </button>
        </div>

        <div class="row" id="notices-container">
            <div class="col-12 text-center">Loading notices...</div>
        </div>
    </div>

    <!-- Notice Modal -->
    <div class="modal fade" id="noticeModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Post Notice</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <form id="notice-form">
                    <div class="modal-body">
                        <div class="mb-3">
                            <label class="form-label">Title</label>
                            <input type="text" class="form-control" id="notice-title" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Content</label>
                            <textarea class="form-control" id="notice-content" rows="4" required></textarea>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Category</label>
                            <select class="form-select" id="notice-category">
                                <option value="general">General</option>
                                <option value="academic">Academic</option>
                                <option value="event">Event</option>
                                <option value="urgent">Urgent</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Expiry Date</label>
                            <input type="date" class="form-control" id="notice-expiry">
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                        <button type="submit" class="btn btn-primary">Post Notice</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="public/js/notice-board.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="public/js/dark-mode.js"></script>
</body>
</html>
