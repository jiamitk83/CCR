<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - School ERP</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="public/css/style.css" rel="stylesheet">
    <script src="public/js/dark-mode.js"></script>
</head>
<body>
    <nav class="navbar navbar-expand-lg sticky-top">
        <div class="container">
            <a class="navbar-brand" href="#"><i class="fas fa-graduation-cap"></i> School ERP</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <div class="navbar-nav ms-auto">
                    <a class="nav-link" href="index.html"><i class="fas fa-home"></i> Dashboard</a>
                    <a class="nav-link" href="student-management.html"><i class="fas fa-user-graduate"></i> Students</a>
                    <a class="nav-link" href="subject-management.html"><i class="fas fa-book"></i> Subjects</a>
                    <a class="nav-link" href="class-management.html"><i class="fas fa-users"></i> Classes</a>
                    <a class="nav-link" href="chapter-management.html"><i class="fas fa-file-alt"></i> Chapters</a>
                    <a class="nav-link" href="current-status.html"><i class="fas fa-tasks"></i> Status</a>
                    <a class="nav-link" href="teacher-management.html"><i class="fas fa-chalkboard-teacher"></i> Teachers</a>
                    <a class="nav-link" href="teacher-allotment.html"><i class="fas fa-tasks"></i> Allotment</a>
                    <a class="nav-link" href="attendance.html"><i class="fas fa-calendar-check"></i> Attendance</a>
                    <a class="nav-link" href="fee-management.html"><i class="fas fa-rupee-sign"></i> Fees</a>
                    <a class="nav-link" href="exam-results.html"><i class="fas fa-clipboard-list"></i> Exams</a>
                    <a class="nav-link" href="timetable.html"><i class="fas fa-calendar-alt"></i> Timetable</a>
                    <a class="nav-link" href="library.html"><i class="fas fa-book-reader"></i> Library</a>
                    <a class="nav-link" href="transport.html"><i class="fas fa-bus"></i> Transport</a>
                    <a class="nav-link" href="notice-board.html"><i class="fas fa-bullhorn"></i> Notices</a>
                    <a class="nav-link" href="homework.html"><i class="fas fa-pencil-alt"></i> Homework</a>
                    <a class="nav-link" href="register.html"><i class="fas fa-user-plus"></i> Register</a>
                    <button id="dark-mode-toggle" class="btn btn-outline-secondary ms-2">
                        <i class="fas fa-moon"></i>
                    </button>
                </div>
            </div>
        </div>
    </nav>
    <div class="container">
        <div class="row justify-content-center mt-5">
            <div class="col-md-5">
                <div class="card shadow">
                    <div class="card-header text-center bg-primary text-white">
                        <h2><i class="fas fa-graduation-cap"></i> School ERP</h2>
                        <p class="mb-0">School Management System</p>
                    </div>
                    <div class="card-body p-4">
                        <h4 class="text-center mb-4">Login to Your Account</h4>
                        <div id="alert-box" class="alert" role="alert" style="display: none;"></div>
                        <form id="login-form">
                            <div class="mb-3">
                                <label for="username" class="form-label">
                                    <i class="fas fa-user"></i> Username or Email
                                </label>
                                <input type="text" class="form-control" id="username" required 
                                       placeholder="Enter your username or email" autofocus>
                            </div>
                            <div class="mb-3">
                                <label for="password" class="form-label">
                                    <i class="fas fa-lock"></i> Password
                                </label>
                                <input type="password" class="form-control" id="password" required 
                                       placeholder="Enter your password">
                            </div>
                            <div class="mb-3 form-check">
                                <input type="checkbox" class="form-check-input" id="remember-me">
                                <label class="form-check-label" for="remember-me">
                                    Remember me
                                </label>
                            </div>
                            <button type="submit" class="btn btn-primary w-100">
                                <i class="fas fa-sign-in-alt"></i> Login
                            </button>
                        </form>
                        <div class="text-center mt-3">
                            <p class="mb-0">Don't have an account? <a href="register.html">Register here</a></p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="public/js/login.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
