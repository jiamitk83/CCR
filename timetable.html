    <script src="public/js/auth-check.js" defer></script>
</head>

            <div class="collapse navbar-collapse" id="navbarNav">
                <div class="navbar-nav ms-auto">
                    <a class="nav-link" href="index.html"><i class="fas fa-home"></i> Dashboard</a>
                    <a class="nav-link" href="student-management.html"><i class="fas fa-user-graduate"></i> Students</a>
                    <a class="nav-link" href="subject-management.html"><i class="fas fa-book"></i> Subjects</a>

                    <a class="nav-link" href="teacher-management.html"><i class="fas fa-chalkboard-teacher"></i> Teachers</a>

            </div>

    <div class="container">
        <h1 class="mb-4"><i class="fas fa-calendar-alt"></i> Timetable Management</h1>
        
        <div class="row g-3 mb-4">
            <div class="col-md-4">
                <select class="form-select" id="timetable-class">
                    <option value="">Select Class</option>
                </select>
            </div>
            <div class="col-md-3">
                <select class="form-select" id="timetable-day">
                    <option value="Monday">Monday</option>
                    <option value="Tuesday">Tuesday</option>
                    <option value="Wednesday">Wednesday</option>
                    <option value="Thursday">Thursday</option>
                    <option value="Friday">Friday</option>
                    <option value="Saturday">Saturday</option>
                </select>
            </div>
            <div class="col-md-2">
                <button class="btn btn-primary w-100" onclick="loadTimetable()">Load</button>
            </div>
        </div>

        <div class="card">
            <div class="card-body p-0">
                <table class="table table-bordered mb-0" id="timetable-table">
                    <thead class="table-dark">
                        <tr>
                            <th>Period</th>
                            <th>Time</th>
                            <th>Subject</th>
                            <th>Teacher</th>
                            <th>Room</th>
                        </tr>
                    </thead>
                    <tbody id="timetable-body">
                        <tr><td colspan="5" class="text-center">Select class and day to view timetable</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="public/js/timetable.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="public/js/dark-mode.js"></script>
